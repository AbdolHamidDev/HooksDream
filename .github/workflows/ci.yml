name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Backend CI
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linting
        run: npm run lint || echo "No lint script configured"
      
      - name: Check for console.log
        run: |
          if grep -r "console\.log" --include="*.js" --exclude-dir=node_modules .; then
            echo "Warning: console.log statements found"
          fi

  # Frontend CI
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linting
        run: npm run lint -- --max-warnings=9999 || echo "Lint warnings/errors found - not blocking build"
      
      - name: TypeScript check
        run: npx tsc --noEmit
      
      - name: Build check
        run: npm run build

  # Python Backend CI
  pybackend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./pyBackend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ./pyBackend/requirements.txt
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Check Python syntax
        run: |
          python -m py_compile main.py
          python -m py_compile config.py
          python -m py_compile routers/bot_router.py
          python -m py_compile services/unsplash_service.py
          python -m py_compile services/bot_service.py

  # Docker build check
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker images
        run: docker compose build --no-cache backend pybackend
